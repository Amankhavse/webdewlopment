
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Card</title>
    <link rel="stylesheet" href="StyleSheet.css">

    <!-- Font Awesome -->
    <script src="https://kit.fontawesome.com/dd8c49730d.js" crossorigin="anonymous"></script>
</head>
<body>


    <div class="card">

        <div class="profile">
            <img src="amanpng.png" alt="Profile Image" class="profile-img">
        </div>

        <div class="content">
            <h2 class="name">Aman Khavse</h2>
            <p class="username">
                <i class="fab fa-github"></i> @aman_khavse
            </p>
            <p class="role">Frontend Developer </p>
            <p class="bio">
                Passionate frontend developer focused on building modern, responsive and user-friendly web interfaces.
            </p>
        </div>

        <div class="social-links">
            <a href="https://github.com" target="_blank" rel="noopener noreferrer">
                <i class="fab fa-github"></i>
            </a>
            <a href="https://twitter.com" target="_blank" rel="noopener noreferrer">
                <i class="fab fa-twitter"></i>
            </a>
            <a href="https://instagram.com" target="_blank" rel="noopener noreferrer">
                <i class="fab fa-instagram"></i>
            </a>
            <a href="https://t.me" target="_blank" rel="noopener noreferrer">
                <i class="fab fa-telegram"></i>
            </a>


        </div>

        <div class="skills">
            <h3>Skills</h3>
            <div class="skill-tags">
                <span>HTML5</span>
                <span>CSS3</span>
                <span>JavaScript (ES6+)</span>
                <span>React.js</span>
                <span>React</span>
                <span>Git</span>
                <span>GitHub</span>
                <div class="action">


                    <a href="mailto:yourmail@gmail.com" class="btn">Contact Me</a>
                </div>
            </div>
        </div>

    </div>

    <script src="JavaScript.js"></script>
</body>
</html>
