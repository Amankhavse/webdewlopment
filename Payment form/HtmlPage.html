<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Form</title>
    <link rel="stylesheet" href="StyleSheet.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

    <div class="h1">
        <p>PAYMENT FORM </p>
    </div>

    <form>
        <div class="container">




            <div class="contact-info">
                <h2>Contact Information</h2>

                <label for="name">Full Name</label>
                <i class="fa fa-user"></i>
                <input type="text" id="name" name="name" placeholder="Enter your name" required>

                <label>Gender</label>
                <div class="gender">
                    <label><input type="radio" name="gender" required> Male</label>
                    <label><input type="radio" name="gender" required> Female</label>
                </div>

                <label for="address">Address</label>
                <textarea id="address" name="address" rows="4" placeholder="Enter your address"></textarea>

                <label for="email">Email</label>
                <i class="fa fa-envelope"></i>
                <input type="email" id="email" name="email" placeholder="Enter your email" required>

                <label for="pincode">Pincode</label>
                <input type="number" id="pincode" name="pincode" placeholder="Enter pincode" required>
            </div>

            <div class="payment-info">
                <h2>Payment Information</h2>

                <label for="card_type">Card Type</label>
                <i class="fa fa-credit-card"></i>
                <select id="card_type" name="card_type" required>
                    <option value="">--Select Card Type--</option>
                    <option value="visa">Visa</option>
                    <option value="mastercard">Mastercard</option>
                    <option value="rupay">Rupay</option>
                </select>

                <label for="card_number">Card Number</label>
                <input type="text" id="card_number" name="card_number" placeholder="1234 5678 9012 3456" maxlength="16" required>

                <label for="expiry_date">Expiry Date</label>
                <input type="date" id="expiry_date" name="expiry_date" required>

                <label for="cvv">CVV</label>
                <i class="fa fa-lock"></i>
                <input type="password" id="cvv" name="cvv" placeholder="123" maxlength="3" required>
            </div>


        </div>

        <div class="submit bg-primory">
            <input type="submit" value="Pay Now">
        </div>
    </form>

  
</body>
</html>
